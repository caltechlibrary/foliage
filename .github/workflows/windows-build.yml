name: Build Windows Executable

on:
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-windows.txt

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-windows.txt
          python -m pip install pyinstaller

      - name: Recreate expected PyWebIO path
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ..\PyWebIO | Out-Null
          Copy-Item -Path vendor\github.com\mhucka\PyWebIO\* -Destination ..\PyWebIO\ -Recurse -Force

      - name: Generate Windows build metadata
        run: |
          python dev/installers/windows/create-version.py
          python dev/installers/windows/create-innosetup-script.py

      - name: Build executable with PyInstaller
        run: |
          python -m PyInstaller --distpath dist/win --clean --noconfirm pyinstaller-win32.spec

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: foliage-windows-exe
          path: dist/win/Foliage.exe
          if-no-files-found: error
